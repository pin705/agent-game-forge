<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Game Forge</title>

    <!-- Favicons (32 / 64 / 128 + Apple touch + manifest hooks). The pixel-art
         OGF mascot is sharp at every size we ship, so we provide explicit
         per-size files instead of relying on the browser to downscale a
         single 1254px source. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/ogf-logo-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/ogf-logo-64.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/ogf-logo-128.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/ogf-logo-180.png" />
    <link rel="shortcut icon" href="/ogf-logo-32.png" />
    <meta name="theme-color" content="#fafaf9" />
    <meta name="theme-color" content="#1a1a17" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="Agent Game Forge" />
    <meta property="og:description" content="Agent-driven 2D game editor — Codex CLI + Godot / Web" />
    <meta property="og:image" content="/ogf-logo-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/ogf-logo-512.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
