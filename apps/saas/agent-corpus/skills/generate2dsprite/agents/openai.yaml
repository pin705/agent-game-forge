interface:
  display_name: "Generate 2D Sprite"
  short_description: "Pixel sprites, clean HD props, bundles, and transparent GIFs."
  default_prompt: "Use the generate2dsprite procedure (SKILL.md + scripts/generate2dsprite.py process) to create clean game sprites or map props that match the current map style; every raw sprite image must originate from built-in image_gen, not Three.js, Canvas, SVG, HTML/CSS drawing, PIL shape drawing, procedural geometry, placeholder primitives, or code-rendered screenshots; for characters, creatures, NPCs, enemies, summons, animated props, and hero actions, do not generate raw single-row sheets like 1x4/1x6/1x8, use centered multi-row grids instead: 4 frames -> 2x2, 6 frames -> 2x3, longer actions -> 2x4/3x3/3x4/4x4, then assemble engine strips or atlases only after QC; STRATEGY SELECTION — every character / creature / NPC / enemy / boss body sheet (idle, walk, run, attack, hurt, cast, channel, action, jump) defaults to --scale-strategy preserve --align feet, and EVERY action sheet for the same character MUST use the same strategy (mixing fit and preserve produces 25-36% body-height drift between actions and is a hard bug); preserve supports integrated weapons, capes, slash arcs, and aura/flame FX in the body sheet without bbox-fit vertical compression, so attack body sheets can include the weapon under preserve; --scale-strategy fit is reserved for projectiles, item icons, pickups, FX sheets (impact/muzzle/spark), UI sprites, and small grid-uniform assets; component_mode=all is the default for character body grids (keeps capes/weapons/auras attached) and use component_mode=largest only when stripping leaked detached subcomponents; for map prop packs, classify assets first and use square 2x2/3x3/4x4 sheets only for compact props, while floors, platforms, bridges, walls, ladders, gates, doors, long hazards, wide/tall props, collision-aligned objects, and tileset/strip pieces must use one-by-one generation, platform strips, custom wide cells, or tileset-like atlases."
