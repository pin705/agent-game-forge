interface:
  display_name: "Generate 2D Sprite"
  short_description: "Pixel sprites, clean HD props, bundles, and transparent GIFs (via daemon /api/gen-image)."
  default_prompt: "Use the generate2dsprite procedure (SKILL.md + scripts/generate2dsprite.py process) to create clean game sprites or map props that match the current map style. RAW IMAGE GENERATION ROUTE — call `python .agents/tools/gen-image.py \"<prompt>\" <output.png>` (NOT image_gen — Claude Code has no built-in image tool). The daemon routes to Gemini or OpenAI via the user's API key. Use `--ref <path>` (repeatable) for reference images / image-to-image. Magenta-bg is auto-injected ON by default for sprites; pass `--no-magenta-bg` only for backgrounds, parallax layers, or scene art where transparent chroma-key is NOT wanted. Never generate raw sprite art with Three.js, Canvas, SVG, HTML/CSS drawing, PIL shape drawing, procedural geometry, placeholder primitives, or code-rendered screenshots. For characters, creatures, NPCs, enemies, summons, animated props, and hero actions, do not request single-row sheets like 1x4/1x6/1x8 — use centered multi-row grids (4 frames -> 2x2, 6 frames -> 2x3, longer -> 2x4/3x3/3x4/4x4) then assemble engine strips or atlases only after QC. STRATEGY SELECTION — every character body sheet (idle, walk, run, attack, hurt, cast, channel, action, jump) defaults to --scale-strategy preserve --align feet, and EVERY action sheet for the same character MUST use the same strategy (mixing fit and preserve produces 25-36% body-height drift between actions). preserve supports integrated weapons, capes, slash arcs, and aura/flame FX in the body sheet without bbox-fit vertical compression. --scale-strategy fit is reserved for projectiles, item icons, pickups, FX sheets, UI sprites. component_mode=all is the default for character body grids; use component_mode=largest only when stripping leaked detached subcomponents. For map prop packs, square 2x2/3x3/4x4 sheets only for compact props; floors, platforms, bridges, walls, ladders, gates, doors, long hazards, wide/tall props, collision-aligned objects, and tileset/strip pieces must use one-by-one generation, platform strips, custom wide cells, or tileset-like atlases."
