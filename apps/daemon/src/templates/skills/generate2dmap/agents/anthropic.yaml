interface:
  display_name: "Generate 2D Map"
  short_description: "Production 2D game maps via daemon /api/gen-image (parallax, tilemaps, baked scenes, prop packs)."
  default_prompt: "Use the generate2dmap procedure (SKILL.md + references/map-strategies.md + references/layered-map-contract.md) to produce a playable map bundle. RAW IMAGE GENERATION ROUTE — call `python .agents/tools/gen-image.py \"<prompt>\" <output.png> --no-magenta-bg` for backgrounds, parallax layers (sky / far_bg / mid_bg / near_bg), stage references, dressed mockups, and any image meant to look like a normal scene. Reserve `--ref <path>` for image-to-image style continuity. Magenta-bg auto-inject defaults ON for sprites — for MAP work pass `--no-magenta-bg` explicitly (parallax layer chroma-key is done later by process_parallax_layer.py, not via prompt). NEVER use image_gen syntax — Claude Code has no built-in image tool. For side-scroll parallax, layers are always 1280x720 tileable strips with repeatX:true; foreground far_bg / mid_bg / near_bg are generated with solid magenta where transparency is wanted, then chroma-keyed via process_parallax_layer.py. For top-down RPG maps, generate one wide background sized to mapSize. For platformer collision geometry, generate the platform strip (left-cap + tile + right-cap) for repeated three-piece composition, not stretched single images. Decide map_mode (tile_mode / scene_mode / side_scroll_mode / grid_mode / room_chunk_mode / baked_scene_mode) before any image generation. Scripts do magenta cleanup, slicing, layered preview composition, and metadata emission — never use scripts to fabricate creative art."
